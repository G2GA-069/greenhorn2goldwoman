<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #131318;
            --surface-2: #1a1a22;
            --border: #2a2a35;
            --text: #e8e4df;
            --text-muted: #8a8590;
            --accent: #b07ce8;
            --brand-purple: #6b2fa0;
            --brand-magenta: #d946ef;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overscroll-behavior: none;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            font-size: 16px;
            line-height: 1.5;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            perspective: 1000px;
        }

        .beat {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 1;
            transform: translateY(0);
            transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            visibility: visible;
            pointer-events: auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .beat {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            max-height: 100vh;
            max-height: 100dvh;
            align-items: flex-start;
            justify-content: flex-start;
            padding-top: 80px;
        }

        .beat::-webkit-scrollbar {
            width: 6px;
        }

        .beat::-webkit-scrollbar-track {
            background: var(--surface);
        }

        .beat::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        .beat-title {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0;
            overflow: hidden;
        }

        .beat-title h1 {
            font-family: 'EB Garamond', serif;
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent), var(--brand-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .beat-title .subtitle {
            font-size: 24px;
            color: var(--text-muted);
            font-weight: 300;
        }

        .beat-scene, .beat-card, .beat-takeaway, .beat-divider, .beat-finale {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .beat-scene h2, .beat-card h2, .beat-takeaway h2, .beat-divider h2 {
            font-family: 'EB Garamond', serif;
            font-size: 48px;
            margin-bottom: 40px;
            color: var(--accent);
        }

        .beat-scene p, .beat-card p, .beat-takeaway p {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 16px;
            color: var(--text);
        }

        .formula-box {
            background: var(--surface-2);
            border-left: 4px solid var(--brand-purple);
            padding: 24px;
            margin: 24px 0;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            line-height: 1.6;
            overflow-x: auto;
        }

        .formula-box strong {
            color: var(--accent);
        }

        .example-box {
            background: var(--surface-2);
            border-left: 4px solid var(--brand-magenta);
            padding: 24px;
            margin: 24px 0;
            border-radius: 4px;
        }

        .example-box h4 {
            color: var(--brand-magenta);
            margin-bottom: 12px;
            font-size: 16px;
        }

        .example-box p {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .example-box code {
            background: var(--surface);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
        }

        .warning-box {
            background: var(--surface-2);
            border-left: 4px solid #ff6b6b;
            padding: 24px;
            margin: 24px 0;
            border-radius: 4px;
        }

        .warning-box h4 {
            color: #ff6b6b;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .warning-box p {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .metric-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .metric-item:last-child {
            border-bottom: none;
        }

        .metric-label {
            font-weight: 600;
            color: var(--text);
        }

        .metric-value {
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }

        .comparison-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 24px 0;
        }

        .comparison-cell {
            background: var(--surface-2);
            padding: 20px;
            border-radius: 4px;
            border-left: 4px solid var(--accent);
        }

        .comparison-cell h4 {
            color: var(--accent);
            margin-bottom: 12px;
            font-size: 16px;
        }

        .comparison-cell p {
            font-size: 15px;
            margin-bottom: 8px;
        }

        .bullet-list {
            list-style: none;
            padding: 0;
        }

        .bullet-list li {
            padding: 8px 0 8px 24px;
            position: relative;
            font-size: 16px;
            line-height: 1.6;
        }

        .bullet-list li:before {
            content: "▸";
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: bold;
        }

        .beat-divider {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .beat-divider h2 {
            font-size: 56px;
            margin-bottom: 20px;
        }

        .beat-divider p {
            font-size: 18px;
            color: var(--text-muted);
        }

        .beat-finale {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0;
        }

        .beat-finale h2 {
            font-size: 56px;
            margin-bottom: 20px;
        }

        .beat-finale canvas {
            margin-top: 40px;
            border-radius: 8px;
        }

        /* Header Controls */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(10, 10, 12, 0.95);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .back-button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: var(--surface-2);
            border-color: var(--accent);
            color: var(--accent);
        }

        .chapter-info {
            font-size: 14px;
            color: var(--text-muted);
            flex: 1;
            text-align: center;
        }

        .progress-bar {
            position: fixed;
            top: 60px;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--brand-purple), var(--brand-magenta));
            transition: width 0.6s ease;
            z-index: 99;
        }

        /* Beat Navigation */
        .nav-dots {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 50;
        }

        .nav-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-dot.active {
            background: var(--accent);
            transform: scale(1.3);
            box-shadow: 0 0 20px rgba(176, 124, 232, 0.5);
        }

        .nav-dot:hover {
            background: var(--accent);
            opacity: 0.7;
        }

        .beat-counter {
            position: fixed;
            left: 40px;
            bottom: 40px;
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            z-index: 50;
        }

        /* Swipe Hint Animation */
        @keyframes swipeHint {
            0%, 100% {
                opacity: 1;
                transform: translateX(0);
            }
            50% {
                opacity: 0.5;
                transform: translateX(10px);
            }
        }

        .swipe-hint {
            position: fixed;
            bottom: 40px;
            right: 40px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            animation: swipeHint 2s ease-in-out infinite;
            z-index: 50;
        }

        .swipe-hint svg {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 768px) {
            .beat {
                padding: 60px 20px;
            }

            .beat-title h1 {
                font-size: 48px;
            }

            .beat-scene h2, .beat-card h2, .beat-takeaway h2, .beat-divider h2 {
                font-size: 32px;
            }

            .comparison-row {
                grid-template-columns: 1fr;
            }

            .nav-dots {
                display: none;
            }

            .beat-counter, .swipe-hint {
                display: none;
            }
        }
    </style>
</head>

    <div class="progress-bar"></div>

    <div class="container" id="container"></div>

    <div class="nav-dots" id="navDots"></div>

    <div class="swipe-hint">
        <span>Swipe or use arrow keys</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>

    </div>

    <script>
        const CHAPTER_NUM = 19;
        let currentBeat = 0;
        let touchStartX = 0;
        let wheelAccumulator = 0;

        const beats = [
            {
                type: 'beat-title',
                title: 'The Natural Resources & Energy Special',
                subtitle: 'Complete subsector coverage for London investment banking interviews'
            },
            {
                type: 'beat-scene',
                title: 'Coverage Universe Overview',
                content: `
                    <p>The Natural Resources & Energy sector spans multiple distinct subsectors with fundamentally different economics:</p>
                    <ul class="bullet-list">
                        <li><strong>Upstream Oil & Gas:</strong> Exploration & Production (E&P), reserve replacement, commodity price sensitivity</li>
                        <li><strong>Midstream:</strong> Pipeline infrastructure, storage, LNG terminals—largely fee-based with contracted revenues</li>
                        <li><strong>Downstream:</strong> Refining, distribution, retail—conversion margin economics (crack spreads)</li>
                        <li><strong>Oilfield Services:</strong> Drilling contractors, completion providers, services companies—highly cyclical with capex correlation</li>
                        <li><strong>Integrated Majors:</strong> Diversified along value chain—sum-of-the-parts (SOTP) valuation frameworks required</li>
                        <li><strong>Mining:</strong> Metals & minerals extraction—reserve classification, all-in sustaining costs (AISC), commodity leverage</li>
                        <li><strong>Utilities:</strong> Regulated revenue bases (RAB model), renewable energy, grid stability—lower volatility, stable dividends</li>
                        <li><strong>Energy Transition:</strong> Renewables, hydrogen, battery storage, CCUS—rapidly evolving technology and policy exposure</li>
                    </ul>
                    <p style="margin-top: 24px;"><strong>Why separate frameworks?</strong> Commodity-linked businesses require explicit price case analysis and stress testing. Utilities use RAB-based returns. Services firms are purely volume/utilisation driven. Renewable IPPs depend on PPA structures and technology learning curves.</p>
                `
            },
            {
                type: 'beat-card',
                title: 'Oil & Gas Upstream: Reserve Categories',
                content: `
                    <p>Understanding reserve classification is foundational to upstream valuation:</p>
                    <ul class="bullet-list">
                        <li><strong>1P (Proved Reserves):</strong> ≥90% confidence of commercial extraction; can be included in SEC reporting</li>
                        <li><strong>2P (Proved + Probable):</strong> 1P + resources with 50%+ confidence; investment-grade threshold</li>
                        <li><strong>3P (Proved + Probable + Possible):</strong> Includes speculative resources; used for upside scenario analysis</li>
                    </ul>

                    <div class="formula-box">
                        <strong>Reserve Life Index (RLI):</strong><br/>
                        RLI = Proved Reserves (boe) / Annual Production (boe/year)<br/>
                        <br/>
                        Interpretation: Years of production at current rates before reserve depletion. >10 years typically required for financing; &lt;5 years signals replacement need.
                    </div>

                    <div class="formula-box">
                        <strong>Finding & Development Cost (F&D):</strong><br/>
                        F&D = Total Exploration & Development Capex / Reserves Added (boe)<br/>
                        <br/>
                        Typical range: $3–8/boe onshore, $8–15/boe offshore, $15–25/boe deepwater.
                    </div>

                    <div class="example-box">
                        <h4>Example: Reserve Life Calculation</h4>
                        <p><strong>Given:</strong> Proved reserves = 150 Mboe, annual production = 10 Mboe</p>
                        <p>RLI = 150 / 10 = <code>15 years</code></p>
                        <p><strong>Interpretation:</strong> At current production rate, this asset has 15 years of reserve life. Combined with 2P reserves of 220 Mboe, growth portfolio is evident.</p>
                    </div>

                    <div class="warning-box">
                        <h4>⚠ Interview Pitfall: Recycle Ratio Confusion</h4>
                        <p>Always state: "Recycle ratio = F&D cost ÷ realised selling price per boe." A ratio >0.8 is considered good—means you're spending &lt;80% of revenue on replacement. Poor recycle ratios signal commodity stress or weak exploration programs.</p>
                    </div>
                `
            },
            {
                type: 'beat-card',
                title: 'Upstream NAV Methodology',
                content: `
                    <p>Net Asset Value (NAV) per barrel is the gold standard for E&P valuation, separating producing reserves from exploration upside:</p>

                    <div class="formula-box">
                        <strong>NAV = PV(Producing Reserves) + Risk-Adjusted PV(Exploration Upside) + Cash – Debt</strong><br/>
                        <br/>
                        For producing reserves: DCF of known fields using type curves (decline profiles) and price deck (WTI/Brent assumptions).
                    </div>

                    <p style="margin-top: 24px;"><strong>Key Inputs:</strong></p>
                    <ul class="bullet-list">
                        <li><strong>Type Curves:</strong> Production profile by field—typically steep decline year 1–3, then flattens; inform cashflow shape</li>
                        <li><strong>Decline Rates:</strong> Exponential decline common; 5–15% annually typical for mature fields</li>
                        <li><strong>Price Deck:</strong> Consensus assumptions (Brent at $60–80/bbl is typical base case); stress cases at $40, $100</li>
                        <li><strong>Opex & Capex:</strong> Maintenance capex to hold production; potential step-changes in opex at end-of-life</li>
                    </ul>

                    <div class="example-box">
                        <h4>Upstream NAV Worked Example</h4>
                        <p><strong>Company:</strong> 100 Mboe of 1P reserves at avg 8% decline, producing 15 Mboe/year currently</p>
                        <p><strong>Scenario:</strong> Brent at $65/bbl, opex $20/bbl, tax rate 40%, WACC 8%</p>
                        <p>Year 1 FCF = (15 Mboe × $65 – 15 × $20) × (1 – 0.40) = <code>$405M</code></p>
                        <p>Declining by 8% annually; NPV @ 8% discount = <code>~$3.5–4.0B</code></p>
                        <p>Plus exploration upside (2P–1P reserves risked at 30–50% probability) and cash; minus debt = <code>NAV/bbl</code></p>
                    </div>

                    <div class="warning-box">
                        <h4>⚠ Decline Curve Sensitivity</h4>
                        <p>Small changes in decline rates create outsized value impacts. A field with 8% vs 10% decline can shift NAV by 20–30%. Always ask: "What's the geological justification for the decline rate?"</p>
                    </div>
                `
            },
            {
                type: 'beat-card',
                title: 'Upstream Key Metrics & EBITDAX',
                content: `
                    <p>Upstream companies are analysed via specific operational metrics that capture economics distinct from standard accounting:</p>

                    <div class="formula-box">
                        <strong>Production Cost per BOE:</strong><br/>
                        = (Opex + G&A) / Total Production (boe)<br/>
                        <br/>
                        Typical range: $15–25/boe for mature fields, $8–12/boe for low-cost assets (Saudi, Qatar).
                    </div>

                    <div class="formula-box">
                        <strong>EBITDAX (Earnings Before D&A, Tax, Interest, and Exploration Expense):</strong><br/>
                        = EBIT + D&A + Exploration Costs (Dry Hole)<br/>
                        <br/>
                        Removes non-cash DD&A; isolates cash-generating capability from reserve depletion accounting.
                    </div>

                    <div class="formula-box">
                        <strong>DD&A per BOE:</strong><br/>
                        = Depreciation & Depletion / Annual Production<br/>
                        <br/>
                        Linked to proved reserves; increases when reserves fall relative to production (RLI compression).
                    </div>

                    <div class="formula-box">
                        <strong>Netback Analysis:</strong><br/>
                        = Realised Price per BOE – Production Costs – Transport – Royalties<br/>
                        <br/>
                        Direct measure of cash generation per barrel; highly sensitive to commodity price.
                    </div>

                    <div class="example-box">
                        <h4>Netback Calculation Example</h4>
                        <p>Realised Brent price: $70/bbl | Production cost: $18/bbl | Transport: $3/bbl | Royalties: $5/bbl</p>
                        <p>Netback = $70 – $18 – $3 – $5 = <code>$44/bbl FCF contribution</code></p>
                        <p>At 50 Mboe/year production = <code>$2.2B annual upstream cash</code></p>
                    </div>

                    <div class="warning-box">
                        <h4>⚠ DD&A vs Depletion Accounting Trap</h4>
                        <p>IFRS typically requires unit-of-production depletion (tied to reserve drawdown), not straight-line. A surprise reserve downgrade forces higher DD&A charges immediately. Always reconcile reserve movements to DD&A volatility.</p>
                    </div>
                `
            },
            {
                type: 'beat-scene',
                title: 'Midstream Economics & Distributable Cash Flow',
                content: `
                    <p>Midstream is fundamentally different from upstream: fee-based revenue, lower commodity sensitivity, stable cash flows. Typical models centre on pipelines, storage, and LNG infrastructure:</p>

                    <ul class="bullet-list">
                        <li><strong>Throughput Volumes:</strong> Physical volumes contracted (mmBtu/day, bpd); tied to long-term take-or-pay agreements</li>
                        <li><strong>Tariff Structures:</strong> Fixed fee per unit OR volumetric + commodity link (less common); indexed to inflation (CPI escalators)</li>
                        <li><strong>Take-or-Pay Contracts:</strong> Customer pays for minimum throughput regardless of actual volume—de-risks revenue</li>
                        <li><strong>EBITDA per Mile:</strong> For pipelines, normalize by system length; compare to peer benchmarks ($1–3M/mile typical)</li>
                    </ul>

                    <div class="formula-box">
                        <strong>Distributable Cash Flow (DCF):</strong><br/>
                        = EBITDA – Interest – Maintenance Capex – Taxes<br/>
                        <br/>
                        Represents cash available to common equity holders (and distributions). More relevant than FCF for MLPs/partnerships.
                    </div>

                    <div class="formula-box">
                        <strong>Distribution Coverage Ratio:</strong><br/>
                        = Distributable Cash Flow / Total Distributions<br/>
                        <br/>
                        Sustainability metric. Ratio >1.1x typically required for long-term viability; <1.0x signals cuts or growth capex needs.
                    </div>

                    <div class="example-box">
                        <h4>Midstream DCF Example</h4>
                        <p><strong>Pipeline Asset:</strong> 5,000 miles, 2.5 Bcf/day contracted throughput, $15/Mcf tariff, all take-or-pay</p>
                        <p>Annual Revenue = 2.5 Bcf/day × 365 days × $15 = <code>~$13.7B</code></p>
                        <p>EBITDA margin typically 60–70% (low opex, minimal DD&A) = <code>$8.2–9.6B</code></p>
                        <p>After ~$2B interest, $0.5B maintenance capex, taxes → DCF ~$4–5B; coverage ratio 1.2–1.4x stable</p>
                    </div>

                    <div class="warning-box">
                        <h4>⚠ Contraction Risk in Midstream</h4>
                        <p>Long-term contracts (10–20 years) lock in tariffs; real tariff erosion if inflation-indexed poorly. Watch for near-term contract rolls or customer bankruptcy (Enron-style risk). Always review customer concentration and renewal schedules.</p>
                    </div>
                `
            },
            {
                type: 'beat-card',
                title: 'Downstream Refining: Crack Spreads & Economics',
                content: `
                    <p>Downstream refining is a conversion margin business. The spread between crude input and refined product output (3-2-1 crack) drives profitability:</p>

                    <div class="formula-box">
                        <strong>3-2-1 Crack Spread ($/bbl crude input):</strong><br/>
                        = (3 × Product Output Value) – (2 × Brent Price) – (1 × Crude Input Cost)<br/>
                        <br/>
                        Simplified: = (3 × Refined Price) – (2 × Brent) – 1 × WTI<br/>
                        Captures margin of a typical refinery: 3 bbl crude → 2 bbl gasoline + 1 bbl diesel
                    </div>

                    <p style="margin-top: 24px;"><strong>Key Refining Metrics:</strong></p>
                    <ul class="bullet-list">
                        <li><strong>Nelson Complexity Index (NCI):</strong> Measures refinery sophistication (hydrocracking, coking); higher NCI → better margins on heavy crude</li>
                        <li><strong>Utilisation Rate:</strong> % of nameplate capacity running; driven by refinery demand cycle and turnarounds (planned maintenance every 3–5 years)</li>
                        <li><strong>Maintenance vs Growth Capex:</strong> Maintenance capex essential to asset life; growth capex to add capacity or upgrade units</li>
                    </ul>

                    <div class="example-box">
                        <h4>Refining Margin Example</h4>
                        <p>Brent: $70/bbl | Gasoline ($/gal): $2.10 | Diesel ($/gal): $2.15</p>
                        <p>3-2-1 spread = (3 × $2.10 + $2.15) – (2 × $70) – $70 / 42 gal/bbl conversion</p>
                        <p>Approximate crack: <code>$15–20/bbl</code> (typical range; swings wildly in commodity cycles)</p>
                    </div>

                    <div class="warning-box">
                        <h4>⚠ Turnaround Impact on Cash Flow</h4>
                        <p>Planned maintenance turnarounds reduce utilisation by 2–5% annually; highly visible and predictable. Always adjust EBITDA estimates for turnaround scheduling. A refinery with frequent turnarounds may show depressed utilisation trends.</p>
                    </div>
                `
            },
            {
                type: 'beat-card',
                title: 'Oilfield Services: Cyclicality & Day Rates',
                content: `
                    <p>Oilfield services companies (drilling contractors, completion providers, wireline, pressure pumping) are pure-play leverage to capex cycles and commodity prices:</p>

                    <ul class="bullet-list">
                        <li><strong>Rig Count:</strong> Forward indicator of E&P capex spending; correlated with WTI/Brent prices with 3–6 month lag</li>
                        <li><strong>Day Rates:</strong> Daily rental cost for rigs; set by supply/demand; highly volatile (can swing $100–200k/day in cycles)</li>
                        <li><strong>Backlog/Book-to-Bill:</strong> Forward revenue visibility; typically 1–3 years of rig contracts announced</li>
                        <li><strong>Utilisation Rate:</strong> % of rig fleet deployed; in downturns, utilisation can fall to 50–60%</li>
                    </ul>

                    <div class="formula-box">
                        <strong>Service Company Revenue Proxy:</strong><br/>

        function initBeats() {
            const container = document.getElementById('container');
            beats.forEach((beat, index) => {
                const beatEl = document.createElement('div');
                beatEl.className = `beat ${beat.type}`;
                beatEl.dataset.beatIndex = index;

                if (beat.type === 'beat-title') {
                    beatEl.innerHTML = `
                        <h1>${beat.title}</h1>
                        <p class="subtitle">${beat.subtitle}</p>
                    `;
                } else if (beat.type === 'beat-divider') {
                    beatEl.innerHTML = `
                        <h2>${beat.title}</h2>
                        <p>${beat.subtitle}</p>
                    `;
                } else if (beat.type === 'beat-finale') {
                    beatEl.innerHTML = `
                        <h2>${beat.title}</h2>
                        <div style="max-width: 900px;">${beat.content}</div>
                        <canvas id="particleCanvas" width="600" height="400" style="margin-top: 40px;"></canvas>
                    `;
                } else {
                    beatEl.innerHTML = `
                        <h2>${beat.title}</h2>
                        <div style="max-width: 900px;">${beat.content}</div>
                    `;
                }

                container.appendChild(beatEl);
            });

            // Initialize particle effect on finale
            setTimeout(() => {
                const canvas = document.getElementById('particleCanvas');
                if (canvas) initParticles(canvas);
            }, 100);
        }

        function initParticles(canvas) {
            const ctx = canvas.getContext('2d');
            const particles = [];

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 1;
                    this.speedX = (Math.random() - 0.5) * 2;
                    this.speedY = (Math.random() - 0.5) * 2;
                    this.color = ['#b07ce8', '#d946ef', '#6b2fa0'][Math.floor(Math.random() * 3)];
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x > canvas.width) this.x = 0;
                    if (this.x < 0) this.x = canvas.width;
                    if (this.y > canvas.height) this.y = 0;
                    if (this.y < 0) this.y = canvas.height;
                }
                draw() {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < 50; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        function positionBeats() {
            const beats = document.querySelectorAll('.beat');
            beats.forEach((beat, index) => {
                if (index === 0) {
                    beat.style.transform = 'translateY(0)';
                    beat.style.opacity = '1';
                    beat.style.visibility = 'visible';
                    beat.style.pointerEvents = 'auto';
                } else {
                    beat.style.transform = 'translateY(100vh)';
                    beat.style.opacity = '1';
                    beat.style.visibility = 'hidden';
                    beat.style.pointerEvents = 'none';
                }
            });
        }

        function goTo(index) {
            if (index < 0 || index >= beats.length) return;
            currentBeat = index;

            const beats_el = document.querySelectorAll('.beat');
            beats_el.forEach((beat, i) => {
                const offset = (i - index) * 100;
                beat.style.transform = `translateY(${offset}vh)`;
                beat.style.opacity = '1';

                if (i === index) {
                    beat.style.visibility = 'visible';
                    beat.style.pointerEvents = 'auto';
                } else if (i < index) {
                    beat.style.visibility = 'hidden';
                    beat.style.pointerEvents = 'none';
                } else {
                    beat.style.visibility = 'hidden';
                    beat.style.pointerEvents = 'none';
                }
            });

            updateUI();
            localStorage.setItem(`ch${CHAPTER_NUM}_beat`, index);
        }

        function updateUI() {
            const progress = ((currentBeat + 1) / beats.length) * 100;
            document.querySelector('.progress-bar').style.width = progress + '%';

            const navDots = document.querySelectorAll('.nav-dot');
            navDots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentBeat);
            });

            document.getElementById('beatCounter').textContent = `${currentBeat + 1} / ${beats.length}`;
        }

        function initNavDots() {
            const container = document.getElementById('navDots');
            beats.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot' + (index === 0 ? ' active' : '');
                dot.addEventListener('click', () => goTo(index));
                container.appendChild(dot);
            });
        }

        // Event listeners
        document.getElementById('container').addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        document.getElementById('container').addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            if (touchStartX - touchEndX > 50) {
                goTo(currentBeat + 1);
            } else if (touchEndX - touchStartX > 50) {
                goTo(currentBeat - 1);
            }
        });

        document.addEventListener('wheel', (e) => {
            e.preventDefault();
            wheelAccumulator += e.deltaY;
            if (wheelAccumulator > 100) {
                wheelAccumulator = 0;
                goTo(currentBeat + 1);
            } else if (wheelAccumulator < -100) {
                wheelAccumulator = 0;
                goTo(currentBeat - 1);
            }
        }, { passive: false });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') goTo(currentBeat + 1);
            if (e.key === 'ArrowLeft') goTo(currentBeat - 1);
        });

        // Initialize
        initBeats();
        positionBeats();
        initNavDots();

        const savedBeat = localStorage.getItem(`ch${CHAPTER_NUM}_beat`);
        if (savedBeat) {
            goTo(parseInt(savedBeat));
        } else {
            goTo(0);
        }
    </script>
